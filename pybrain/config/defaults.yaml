# pybrain/config/defaults.yaml
# Segmentation thresholds (post-boost — v6 calibration)
# Lowered from 0.20 to reduce systematic over-segmentation of edema.
thresholds:
  wt: 0.45   # Whole Tumour — raised to prevent edema over-segmentation (radiologist: 32cc)
  tc: 0.35   # Tumour Core — recalibrated for correct probability space
  et: 0.35   # Enhancing Tumour — recalibrated (model max ET prob ~0.60)

# Statistical Threshold Optimization (BraTS QU-inspired)
statistical_thresholds:
  enabled: false                    # Enable uncertainty-based adaptive thresholding
  adaptive_uncertainty: true        # Use uncertainty to modulate thresholds
  uncertainty_weight: 0.1          # Weight for uncertainty adjustment (0-1)
  clinical_bounds:                  # Safety bounds to prevent pathological thresholds
    wt: [0.30, 0.70]               # Whole tumor reasonable range
    tc: [0.25, 0.65]               # Tumor core reasonable range
    et: [0.20, 0.60]               # Enhancing tumor reasonable range

# CT Boosting logic (Solid Tissue Prior)
# HU [35, 75] captures hyperdense tumour tissue while excluding normal brain
#   - Normal white matter: 24–32 HU  (excluded)
#   - Normal gray matter:  32–41 HU  (mostly excluded; 35–41 overlap is gated by MRI)
#   - Tumour solid tissue: 40–80 HU  (captured)
# Formula: linear additive — only boosts voxels already flagged as possible tumour (≥0.30 WT)
ct_boost:
  min_hu: 35      # above normal WM (24-32), slight GM overlap gated by MRI WT ≥ 0.30
  max_hu: 75      # captures hyperdense tumour, excludes calcification artefacts >75
  boost_factor: 0.30  # moderate boost — validated range [0.20, 0.40]
  nmi_threshold: 1.3  # Studholme NMI (H_x+H_y)/H_xy, range [1,∞). Well-aligned brain MRI-CT pairs typically ≥1.3.
  # Updated from 1.05 (was calibrated against different formula scale).
  nmi_validation: true  # enable NMI-based registration validation
  force_enable: false  # safety: never force enable CT boost in clinical use

# Ensemble weighting (SegResNet + TTA-4 only — validated stable)
# Current: SegResNet 60% + TTA-4 40% — both active and validated
# SwinUNETR and nnU-Net disabled until fully calibrated
ensemble_weights:
  segresnet: 0.60   # Primary model — highest weight
  tta4: 0.40        # TTA ensemble — noise reduction
  swinunetr: 0.0    # DISABLED: awaiting Platt calibration (see TODO below)
  nnunet: 0.0       # DISABLED: no pretrained weights available

# Subregion-specific ensemble weights for optimized Dice scores
# Based on model strengths: SwinUNETR (WT boundaries), SegResNet (ET core), TTA-4 (noise reduction)
subregion_ensemble_weights:
  enabled: false    # Set to true to enable subregion-specific weighting
  adaptive: false   # Set to true for adaptive weights based on uncertainty/performance
  
  # Static weights based on model characteristics
  WT:  # Whole Tumor - SwinUNETR excels at edema boundaries
    swinunetr: 0.40
    segresnet: 0.25
    tta4: 0.20
    nnunet: 0.15
  
  TC:  # Tumor Core - SegResNet strong at core structures
    segresnet: 0.35
    nnunet: 0.30
    swinunetr: 0.20
    tta4: 0.15
  
  ET:  # Enhancing Tumor - SwinUNETR and SegResNet both strong
    swinunetr: 0.35
    segresnet: 0.35
    tta4: 0.20
    nnunet: 0.10

# Advanced Preprocessing
preprocessing:
  histogram_normalize: true
  bilateral_filter: true
  denoise_strength: 0.05

# Ensemble Expansion
models:
  swinunetr:
    use_folds: [0, 1, 2, 3, 4]
    overlap: 0.5
    roi_size: [128, 128, 128]
  nnunet:
    enabled: false                      # PERMANENTLY DISABLED: no pretrained weights
    # NOTE: Do not enable without pretrained nnunet_weights.pth
    # Training DynUNet on Mac mini is not recommended — use GPU server
    bundle_dir: "models/brats_bundle"
    weights: "nnunet_weights.pth"       # Place pretrained weights here to enable
    roi_size: [128, 128, 128]
    overlap: 0.5
    filters: [32, 64, 128]              # Must match trained weights (3-stage DynUNet)
    deep_supervision: false             # Only for training

  # Clinical Post-processing
  postprocessing:
    crf_refinement: false  # Requires pydensecrf (disabled — enable when installed)
    anatomical_constraints: false
    shape_filtering: false
    min_solidity: 0.7
    max_eccentricity: 0.96

  # MC-Dropout uncertainty quantification
  # Runs stochastic forward passes with dropout enabled for calibrated uncertainty.
  # Provides epistemic uncertainty estimates suitable for FDA/CE-MDR reporting.
  mc_dropout:
    enabled: true
    n_samples: 15  # Number of MC samples (10-20 recommended for balance of speed/accuracy)
    models: ["segresnet"]  # Which models to run MC-Dropout on

  # TODO: Enable SwinUNETR — requires:
  #   1. Run: python scripts/compute_platt_calibration.py --cases 50 (without --skip-swinunetr)
  #   2. Validate SwinUNETR produces calibrated prob maps [0,1] with sigmoid
  #   3. Set ensemble_weights.swinunetr > 0 (e.g., 0.30) and adjust others
  #   4. Run full regression suite: python tests/regression_baseline.py --device cpu
  #   5. Verify Dice WT remains ≥ 0.93 on BraTS2021_00000
  #
  # SwinUNETR weights location: models/brats_bundle/fold*_swinunetr.pth
  # Current status: NOT CALIBRATED — keep weight at 0.0 until ready

  # Platt scaling calibration — trained on 50-case BraTS 2021 validation cohort
  # Coefficients file generated by scripts/compute_platt_calibration.py
  # Calibrates raw sigmoid outputs to true probabilities per subregion (TC/WT/ET)
  platt_calibration:
    coefficients_file: "models/calibration/platt_coefficients.json"  # Relative to project root
    # Fallback: if file missing, apply_platt_calibration() uses identity (no adjustment)

# Clinical Calibration
calibration:
  enabled: true
  factor_file: "calibration_factor.json"
  min_cases_for_auto: 5

# Clinical consistency validation parameters
clinical:
  match_tolerance: 0.15 # 15% difference max before warning
  entropy_threshold: 0.55
