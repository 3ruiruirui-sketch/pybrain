# pybrain/config/defaults.yaml
# Segmentation thresholds (legacy defaults from 3_brain_tumor_analysis.py)
# These match the legacy script which produced 44.5 cc WT for Celeste (radiologist: 38 cc)
thresholds:
  wt: 0.50   # Whole Tumour — legacy default
  tc: 0.40   # Tumour Core — legacy default
  et: 0.45   # Enhancing Tumour — legacy default

# Statistical Threshold Optimization (BraTS QU-inspired)
statistical_thresholds:
  enabled: true                    # Enable uncertainty-based adaptive thresholding
  adaptive_uncertainty: true        # Use uncertainty to modulate thresholds
  uncertainty_weight: 0.1          # Weight for uncertainty adjustment (0-1)
  clinical_bounds:                  # Safety bounds to prevent pathological thresholds
    wt: [0.30, 0.70]               # Whole tumor reasonable range
    tc: [0.25, 0.65]               # Tumor core reasonable range
    et: [0.20, 0.60]               # Enhancing tumor reasonable range

# CT Boosting logic (Solid Tissue Prior)
# HU [35, 75] captures hyperdense tumour tissue while excluding normal brain
#   - Normal white matter: 24–32 HU  (excluded)
#   - Normal gray matter:  32–41 HU  (mostly excluded; 35–41 overlap is gated by MRI)
#   - Tumour solid tissue: 40–80 HU  (captured)
# Formula: linear additive — only boosts voxels already flagged as possible tumour (≥0.30 WT)
ct_boost:
  min_hu: 35      # above normal WM (24-32), slight GM overlap gated by MRI WT ≥ 0.30
  max_hu: 75      # captures hyperdense tumour, excludes calcification artefacts >75
  boost_factor: 0.30  # moderate boost — validated range [0.20, 0.40]
  nmi_threshold: 1.3  # Studholme NMI (H_x+H_y)/H_xy, range [1,∞). Well-aligned brain MRI-CT pairs typically ≥1.3.
  # Updated from 1.05 (was calibrated against different formula scale).
  nmi_validation: true  # enable NMI-based registration validation
  force_enable: false  # safety: never force enable CT boost in clinical use

# Ensemble weighting — DERIVED FROM 50-CASE BraTS 2021 CALIBRATION (2026-04-29)
# After fixing the SwinUNETR input-channel permutation bug (T1/T1c were swapped),
# re-measured mean Dice on full BraTS volumes:
#   SegResNet:  TC 0.936 | WT 0.923 | ET 0.856
#   TTA-4:      TC 0.937 | WT 0.926 | ET 0.860
#   SwinUNETR:  TC 0.951 | WT 0.942 | ET 0.902   ← strongest on all three channels
#   Ensemble:   TC 0.948 | WT 0.936 | ET 0.886
# Weights are Dice-proportional per compute_platt_calibration.py; all three
# models contribute roughly equally (SwinUNETR slightly higher as expected).
ensemble_weights:
  segresnet: 0.3297   # MONAI BraTS bundle (SegResNet)
  tta4:      0.3308   # 4-flip TTA over SegResNet
  swinunetr: 0.3394   # 5-fold MONAI BraTS 2021 SwinUNETR

# Subregion-specific weights — use measured per-channel Dice to weight each
# model where it is strongest. SwinUNETR is best on TC/WT/ET, so it leads in
# all three; SegResNet + TTA-4 still contribute meaningful variance-reduction.
subregion_ensemble_weights:
  enabled: true
  adaptive: false

  WT:   # Whole Tumor — SwinUNETR Dice 0.942 > TTA4 0.926 > SegResNet 0.923
    swinunetr: 0.36
    tta4:      0.32
    segresnet: 0.32

  TC:   # Tumor Core — SwinUNETR Dice 0.951 > TTA4 0.937 > SegResNet 0.936
    swinunetr: 0.36
    tta4:      0.32
    segresnet: 0.32

  ET:   # Enhancing Tumor — SwinUNETR Dice 0.902 >> TTA4 0.860 > SegResNet 0.856
    swinunetr: 0.40
    tta4:      0.30
    segresnet: 0.30

# Advanced Preprocessing
preprocessing:
  histogram_normalize: true
  bilateral_filter: true
  denoise_strength: 0.05

# Ensemble Expansion
models:
  bundle_dir: "models/brats_bundle"
  swinunetr:
    use_folds: [0, 1, 2, 3, 4]
    overlap: 0.5
    roi_size: [128, 128, 128]

  # Clinical Post-processing
  postprocessing:
    crf_refinement: false  # Requires pydensecrf (disabled — enable when installed)
    anatomical_constraints: false
    shape_filtering: false
    min_solidity: 0.7
    max_eccentricity: 0.96
    # Remove edema components that are not spatially contiguous with the
    # tumour core (NCR ∪ ET). Essential for elderly patients where
    # BraTS-trained models over-predict FLAIR hyperintensity from
    # leukoaraiosis as peritumoural edema.
    prune_isolated_edema: true
    edema_core_gap_mm: 3.0       # Dilation tolerance to absorb boundary noise
    # Maximum geometric distance (mm) from the nearest tumour-core voxel
    # that an edema voxel is allowed to reach. Peritumoural edema in GBM
    # rarely extends beyond 30-40 mm; anything farther is almost certainly
    # leukoaraiosis (age-related small-vessel disease FLAIR hyperintensity).
    # Set to 0 to disable the distance constraint.
    edema_max_distance_mm: 40.0
    # FLAIR-intensity edema filter — reject edema voxels whose FLAIR
    # signal is not at least N robust SDs above the within-patient median
    # of non-tumour brain. Real vasogenic peritumoural edema is markedly
    # FLAIR-hyperintense; leukoaraiosis is only moderately so.
    # Disabled if FLAIR not available; tune `edema_min_flair_zscore` lower
    # if the filter is too aggressive (rare).
    edema_intensity_filter: true
    edema_min_flair_zscore: 1.0  # SDs above non-tumour brain median (uniform fallback)
    # Distance-tiered FLAIR z-thresholds (preferred over uniform).
    # Each tier is [max_distance_mm, min_zscore]:
    #   - voxels with distance ≤ tier_distance must satisfy z ≥ tier_zscore
    #   - voxels beyond the last tier inherit the strictest (last) threshold
    # Rationale (Celeste 2026-04-29 calibration analysis):
    #   d ≤  5 mm: trust dim signal — infiltrative edema rim near core
    #   d ≤ 15 mm: require z ≥ 1.25 — typical peritumoural vasogenic edema
    #   d > 15 mm: require z ≥ 1.5  — distant FLAIR must be markedly bright
    # Set to null/empty to fall back to uniform `edema_min_flair_zscore`.
    edema_zscore_distance_tiers:
      - [5.0,  1.0]
      - [15.0, 1.25]
      - [999.0, 1.5]

  # MC-Dropout uncertainty quantification
  # Runs stochastic forward passes with dropout enabled for calibrated uncertainty.
  # Provides epistemic uncertainty estimates suitable for FDA/CE-MDR reporting.
  mc_dropout:
    enabled: false
    n_samples: 15  # Number of MC samples (10-20 recommended for balance of speed/accuracy)
    models: ["segresnet"]  # Which models to run MC-Dropout on

  # TODO: Enable SwinUNETR — requires:
  #   1. Run: python scripts/compute_platt_calibration.py --cases 50 (without --skip-swinunetr)
  #   2. Validate SwinUNETR produces calibrated prob maps [0,1] with sigmoid
  #   3. Set ensemble_weights.swinunetr > 0 (e.g., 0.30) and adjust others
  #   4. Run full regression suite: python tests/regression_baseline.py --device cpu
  #   5. Verify Dice WT remains ≥ 0.93 on BraTS2021_00000
  #
  # SwinUNETR weights location: models/brats_bundle/fold*_swinunetr.pth
  # Current status: NOT CALIBRATED — keep weight at 0.0 until ready

  # Platt scaling calibration — trained on 50-case BraTS 2021 validation cohort
  # Coefficients file generated by scripts/compute_platt_calibration.py
  # Calibrates raw sigmoid outputs to true probabilities per subregion (TC/WT/ET)
  platt_calibration:
    coefficients_file: "models/calibration/platt_coefficients.json"  # Relative to project root
    # Fallback: if file missing, apply_platt_calibration() uses identity (no adjustment)

# Clinical Calibration
calibration:
  enabled: true
  factor_file: "calibration_factor.json"
  min_cases_for_auto: 5

# CT calcification threshold for non-GBM detection
segmentation:
  non_gbm_ct_calc_threshold_cc: 200.0  # raised for thick-slice hospital CT (25mm slices)
                                         # lower when using thin-slice CT (1-3mm)

# Clinical consistency validation parameters
clinical:
  match_tolerance: 0.15 # 15% difference max before warning
  entropy_threshold: 0.55

# Output format configuration
output:
  formats:
    nifti: true
    dicom_seg: false   # opt-in for clinical workflows
    dicom_sr: false    # opt-in for clinical workflows
    pdf_report: true
  dicom_seg:
    series_description: "PY-BRAIN BraTS Segmentation (Research Only)"
    algorithm_name: "PY-BRAIN v2"
    include_disclaimer: true
  dicom_sr:
    series_description: "PY-BRAIN Tumor Measurements (Research Only)"
    include_disclaimer: true

# Longitudinal comparison configuration
longitudinal:
  enabled: false
  registration:
    transform: "rigid"   # rigid | affine
    metric: "mattes_mi"
    sampling_pct: 0.1
    nmi_min: 1.3
  rano:
    pr_threshold_pct: 50
    pd_threshold_pct: 25
    enable_assessment: true

# PACS integration configuration
pacs:
  enabled: false
  local_ae_title: "PYBRAIN"
  local_port: 11112
  peer:
    ae_title: "ORTHANC"
    host: "localhost"
    port: 4242
  triage:
    require_modalities: ["MR"]
    require_series_descriptions: ["T1", "T1c", "T2", "FLAIR"]
    auto_route_back: true
    output_destination_ae: "ORTHANC"

# Brain metastases analysis configuration
mets:
  enabled: false
  detection:
    method: "fallback_threshold"  # nndetection | retinanet | fallback_threshold
    min_lesion_volume_cc: 0.05
    confidence_threshold: 0.5
    max_lesions: 50
    min_voxels: 10
  segmentation:
    patch_size: [64, 64, 64]
    model_path: "models/mets_bundle/segmenter.pth"
