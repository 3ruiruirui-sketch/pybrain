# pybrain/config/hardware_profiles.yaml
# Hardware-specific execution profiles

profiles:
  mps: # Apple Silicon (M-series)
    roi_size: [96, 96, 96]
    sw_batch_size: 1
    overlap: 0.5
    device: "mps"
    model_device: "cpu" # Conv3D fallback logic usually needed
    
  cuda: # NVIDIA GPU
    roi_size: [96, 96, 96]
    sw_batch_size: 4
    overlap: 0.5
    device: "cuda"
    model_device: "cuda"

  cpu: # Standard CPU
    roi_size: [96, 96, 96]
    sw_batch_size: 1
    overlap: 0.25
    device: "cpu"
    model_device: "cpu"
