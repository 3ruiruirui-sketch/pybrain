# pybrain/config/defaults.yaml
# Default thresholds and clinical weights for Brain Tumor Analysis

thresholds:
  wt: 0.35
  tc: 0.35
  et: 0.35
  # Adaptive fallbacks
  min_wt: 0.20
  min_tc: 0.25

ensemble_weights:
  # Weights derived from 50-case BraTS 2021 measurement (seed=42).
  # SegResNet mean Dice: WT=0.923 TC=0.936 ET=0.856
  # SwinUNETR: not measured on full volumes — set to 0.0 until measured.
  #   Rerun: python scripts/compute_platt_calibration.py (without --skip_swinunetr)
  # nnunet is excluded from this pipeline — weight permanently 0.0.
  # Do not change without validated BraTS pretrained weights.
  segresnet: 0.5
  tta4: 0.5
  swinunetr: 0.0
  nnunet: 0.0

clinical:
  core_min_ratio: 0.05
  entropy_warn: 0.70
  match_tolerance: 0.20

ct_boost:
  hu_min: 25
  hu_max: 60
  weight: 0.15
  # Gate A NMI (Studholme-style, range [1,∞]) — used by should_apply_ct_boost
  # Formula: (H_x+H_y)/H_xy. Well-aligned brain MRI-CT pairs typically ≥1.3.
  # Updated from 0.3 (stale: was calibrated against the old inverted formula).
  nmi_threshold: 1.3
  # Gate B NMI (Studholme convention, range [1,2]) — used by _compute_nmi internally
  # These are DIFFERENT scales and must NOT share the same key or value.
  nmi_threshold_internal: 1.05

labels:
  1: "Necrotic core"
  2: "Edema"
  3: "Enhancing tumor"

models:
  preprocessing:
    histogram_normalize: false
    bilateral_filter: false
    denoise_strength: 0.05
  segresnet:
    roi_size: [240, 240, 160]
    overlap: 0.5
  tta4:
    roi_size: [240, 240, 160]
    overlap: 0.5
    enhanced_tta: false  # Disabled: ensemble weights calibrated on simple 4-flip TTA.
    # Re-enable only after re-running compute_platt_calibration.py with enhanced TTA active
    # to re-measure TTA-4 Dice and update ensemble_weights.tta4 accordingly.
    tta_config:
      enable_flips: true
      enable_rotations: true
      enable_scaling: false
      enable_intensity: false
      rotation_angles: [90, 180, 270]
      scale_factors: [0.9, 1.1]
  swinunetr:
    weights: "fold1_swin_unetr.pth" # fold4 weights mapped to this name
    roi_size: [128, 128, 128]
    overlap: 0.5
    fallback_overlap: 0.25
  statistical_thresholds:
    enabled: true
    adaptive_uncertainty: true
    uncertainty_weight: 0.1
    clinical_bounds:
      wt: [0.30, 0.70]
      tc: [0.25, 0.65]
      et: [0.20, 0.60]
  staple_ensemble:
    enabled: false  # Requires ≥2 statistically independent models.
    # segresnet + tta4 share the same bundle weights — not independent.
    # Re-enable only when SwinUNETR (or another model with distinct weights)
    # is added and its ensemble_weights entry is > 0.0.
    subregion_weights:
      # Optional subregion-specific weights (will be blended with STAPLE)
      # Format: {model_name: weight}
      # Example for WT channel (edema boundaries):
      #   swinunetr: 1.2
      #   segresnet: 1.0
      #   tta4: 0.8
  nnunet:
    enabled: false  # Permanently disabled — no pretrained weights in this deployment.
    # ensemble_weights.nnunet is locked to 0.0. Do not enable.
    roi_size: [128, 128, 128]
    overlap: 0.5
  mc_dropout:
    enabled: false
    n_samples: 20
    models: ["segresnet", "swinunetr"]  # Models to apply MC-Dropout to
    # MC-Dropout provides calibrated uncertainty suitable for FDA/CE-MDR reporting

  # Platt scaling calibration — trained on 50-case BraTS 2021 validation cohort
  # Coefficients file generated by scripts/compute_platt_calibration.py
  # Calibrates raw sigmoid outputs to true probabilities per subregion (TC/WT/ET)
  platt_calibration:
    coefficients_file: "models/calibration/platt_coefficients.json"
    # Fallback: if file missing, apply_platt_calibration() uses identity (no adjustment)

visualizations:
  generate_animation: true # Can be 270MB+
  auto_open: true
