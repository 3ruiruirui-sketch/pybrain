name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff pyright

      - name: Install core deps (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install medical imaging deps
        run: pip install monai nibabel SimpleITK pydicom numpy scipy scikit-image pandas pyyaml

      - name: Run ruff
        run: ruff check pybrain/ scripts/ --output-format=github
        continue-on-error: true

      - name: Run pyright
        run: pyright pybrain/ --outputjson 2>&1 | tail -5
        continue-on-error: true

  # ─── Smoke Tests ─────────────────────────────────────────────────────────
  smoke:
    name: Import Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install monai nibabel SimpleITK pydicom numpy scipy scikit-image pandas pyyaml einops

      - name: Smoke test — package imports
        run: python -c "import torch; import monai; import nibabel; import SimpleITK; import pydicom; import numpy as np; import scipy; import sklearn; print('All imports OK'); print(f'PyTorch: {torch.__version__}'); print(f'MONAI: {monai.__version__}'); print(f'NumPy: {np.__version__}')"

      - name: Smoke test — pybrain module
        run: python -c "import sys; sys.path.insert(0, '.'); from pybrain.core import metrics, normalization; from pybrain.io import config as io_config; print('pybrain core imports OK')"

      - name: Smoke test — scripts module
        run: python -c "import sys; sys.path.insert(0, '.'); import scripts.utils as utils; print('scripts.utils OK')"

  # ─── Documentation ────────────────────────────────────────────────────────
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for f in README.md LICENSE CITATION.cff CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done

      - name: Check docs/ directory structure
        run: |
          for f in docs/DATA.md docs/technical/VALIDATION.md docs/technical/MODEL_CARD.md docs/technical/REPRODUCIBILITY.md; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done

# ─── Notes ───────────────────────────────────────────────────────────────────
# Lightweight CI checks only:
#   • No GPU inference — too slow and Mac MPS not available in CI
#   • No model weight downloads — would make CI too slow
#   • No full regression suite — requires model weights and BraTS data
#
# To run the full regression suite locally:
#   python -m pytest tests/regression_baseline.py -v
#
# See docs/technical/VALIDATION.md for the complete validation protocol.
