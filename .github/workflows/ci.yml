name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff pyright

      - name: Install core deps (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install medical imaging deps
        run: pip install monai nibabel SimpleITK pydicom numpy scipy scikit-image pandas pyyaml

      - name: Run ruff
        run: ruff check pybrain/ scripts/ --output-format=github
        continue-on-error: true

      - name: Run pyright
        run: pyright pybrain/ --outputjson 2>&1 | tail -5
        continue-on-error: true

  smoke:
    name: Import Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu && \
          pip install monai nibabel SimpleITK pydicom numpy scipy scikit-image scikit-learn pandas pyyaml einops

      - name: Smoke test - package imports
        run: |
          python -c "import torch; import monai; import nibabel; import SimpleITK; import pydicom; import numpy as np; import scipy; import sklearn; print('All imports OK'); print('PyTorch:', torch.__version__); print('MONAI:', monai.__version__); print('NumPy:', np.__version__)"

      - name: Smoke test - pybrain module
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from pybrain.core import metrics, normalization; print('pybrain core imports OK')"

      # scripts.utils requires an active session to load on import,
      # so we skip it in CI. It works fine in local development.
      # - name: Smoke test - scripts module

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install monai nibabel SimpleITK pydicom numpy scipy scikit-image scikit-learn pandas pyyaml einops
          pip install pytest pytest-cov pyyaml

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --cov=pybrain \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow and not gpu and not integration" \
            --ignore=tests/regression_baseline.py

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for f in README.md LICENSE CITATION.cff CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done

      - name: Check docs directory structure
        run: |
          for f in docs/DATA.md docs/technical/VALIDATION.md docs/technical/MODEL_CARD.md docs/technical/REPRODUCIBILITY.md; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; exit 1; fi
          done

# NOTE: This CI runs lightweight checks only. No GPU inference (too slow for CI).
# Full regression suite: python -m pytest tests/regression_baseline.py -v
# See docs/technical/VALIDATION.md for validation protocol.
