version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pybrain-postgres
    environment:
      POSTGRES_USER: pybrain
      POSTGRES_PASSWORD: pybrain
      POSTGRES_DB: pybrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pybrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pybrain-network

  # Redis (Celery broker and backend)
  redis:
    image: redis:7-alpine
    container_name: pybrain-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pybrain-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pybrain-api
    environment:
      DATABASE_URL: postgresql+asyncpg://pybrain:pybrain@postgres:5432/pybrain
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/pybrain
      JWT_SECRET: change-me-in-production
      ENVIRONMENT: development
      API_KEYS: '["dev-api-key-123"]'
    volumes:
      - ./data/pybrain:/data/pybrain
      - ./pybrain:/app/pybrain
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pybrain/config:/app/pybrain/config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pybrain-network

  # Celery Worker (GPU-enabled)
  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pybrain-worker
    command: celery -A pybrain.api.tasks worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://pybrain:pybrain@postgres:5432/pybrain
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /data/pybrain
      JWT_SECRET: change-me-in-production
      ENVIRONMENT: development
      API_KEYS: '["dev-api-key-123"]'
    volumes:
      - ./data/pybrain:/data/pybrain
      - ./pybrain:/app/pybrain
      - ./pybrain/config:/app/pybrain/config
      - ./pybrain/models:/app/pybrain/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - pybrain-network

  # Orthanc PACS (from previous work)
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: pybrain-orthanc
    environment:
      ORTHANC_JSON: |
        {
          "Name": "PY-BRAIN Orthanc",
          "DicomAet": "PYBRAIN",
          "DicomPort": 4242,
          "HttpPort": 8042,
          "RemoteAccessAllowed": true,
          "RegisteredUsers": {
            "orthanc": "orthanc"
          },
          "Plugins": [
            "/usr/share/orthanc/plugins/libServeFolders.so"
          ]
        }
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - orthanc_storage:/var/lib/orthanc/storage
    ports:
      - "4242:4242"  # DICOM
      - "8042:8042"  # HTTP
    networks:
      - pybrain-network

  # Flower (Celery monitoring) - Optional
  flower:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: pybrain-flower
    command: celery -A pybrain.api.tasks flower --port=5555
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - pybrain-network

volumes:
  postgres_data:
  orthanc_data:
  orthanc_storage:

networks:
  pybrain-network:
    driver: bridge
