version: '3.8'

services:
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: pybrain-orthanc
    ports:
      - "4242:4242"  # DICOM port
      - "8042:8042"  # Web UI / REST API
    environment:
      - ORTHANC_JSON=/etc/orthanc/orthanc.json
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-db:/var/lib/orthanc/db
      - orthanc-index:/var/lib/orthanc/db/index
    restart: unless-stopped
    networks:
      - pybrain-network

  postgres:
    image: postgres:15-alpine
    container_name: pybrain-orthanc-db
    environment:
      - POSTGRES_USER=orthanc
      - POSTGRES_PASSWORD=orthanc
      - POSTGRES_DB=orthancdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pybrain-network

networks:
  pybrain-network:
    driver: bridge

volumes:
  orthanc-db:
  orthanc-index:
  postgres-data:
